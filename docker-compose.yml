services:
 clinic_db:
   image: postgres:17
   container_name: clinic_db
   environment:
     POSTGRES_DB: ${DATABASE_NAME}
     POSTGRES_USER: ${SUPERUSER_USERNAME}
     POSTGRES_PASSWORD: ${SUPERUSER_PASSWORD}
   ports:
     - "5432:5432"
   volumes:
     - postgres_data:/var/lib/postgresql/data
   env_file:
     - .env

 clinic_pg4:
   image: dpage/pgadmin4
   container_name: clinic_pg4
   restart: always
   ports:
     - "8888:80"
   environment:
     PGADMIN_DEFAULT_EMAIL: ${SUPERUSER_USERNAME}
     PGADMIN_DEFAULT_PASSWORD: ${SUPERUSER_PASSWORD}
   volumes:
     - pgadmin-data:/var/lib/pgadmin

 clinic_backend:
   build: .
   container_name: clinic_backend
   expose:
     - "8000"
   depends_on:
     - clinic_db
   environment:
     DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
     DEBUG: ${DEBUG}
     DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
     DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
     DATABASE_ENGINE: ${DATABASE_ENGINE}
     DATABASE_NAME: ${DATABASE_NAME}
     DATABASE_USERNAME: ${DATABASE_USERNAME}

     DATABASE_PASSWORD: ${DATABASE_PASSWORD}
     DATABASE_HOST: ${DATABASE_HOST}
     DATABASE_PORT: ${DATABASE_PORT}
   volumes:
     - .:/app
     - ./media:/app/media
     - ./staticfiles:/app/staticfiles
   env_file:
     - .env

 nginx:
   image: nginx:1.27-alpine
   container_name: clinic_nginx
   depends_on:
     - clinic_backend
   ports:
     - "80:80"
   volumes:
     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
     - ./staticfiles:/app/staticfiles:ro
     - ./media:/app/media:ro
   restart: unless-stopped

 rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

 celery_worker:
   build: .
   command: celery -A web worker --loglevel=info
   depends_on:
     - rabbitmq
     - clinic_db
   environment:
     DATABASE_ENGINE: ${DATABASE_ENGINE}
     DATABASE_NAME: ${DATABASE_NAME}
     DATABASE_USERNAME: ${DATABASE_USERNAME}

     DATABASE_PASSWORD: ${DATABASE_PASSWORD}
     DATABASE_HOST: ${DATABASE_HOST}
     DATABASE_PORT: ${DATABASE_PORT}
   env_file:
     - .env
   volumes:
     - .:/app

 celery_beat:
   build: .
   command: celery -A web beat --loglevel=info
   depends_on:
     - rabbitmq
     - clinic_db
   env_file:
     - .env
   volumes:
     - .:/app

volumes:
   postgres_data:
   pgadmin-data:
   rabbitmq_data:
   celery_beat_data:
