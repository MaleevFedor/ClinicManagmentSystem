<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Сервис{% endblock %}</title>

  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">

  <style>
    :root {
      --page-pad: clamp(12px, 2.5vw, 32px);
      --radius: 18px;
      --max-readable: 960px;
      --bg-color-1: #027FC2;
      --bg-color-2: #00639C;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    body {
      background: linear-gradient(145deg, var(--bg-color-1), var(--bg-color-2));
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: stretch;
      -webkit-font-smoothing: antialiased;
    }

    /* белое окно */
    .app-shell {
      margin: var(--page-pad);
      border-radius: var(--radius);
      background: #fefefe;
      border: 1px solid rgba(255,255,255,0.3);

      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: min(960px, 50vw);
      min-height: auto;

      box-shadow:
        0 25px 60px rgba(0,0,0,0.12),
        0 4px 15px rgba(0,0,0,0.08);

      animation: fadeIn 0.4s ease-out;
      transition: box-shadow 0.3s ease;

      overflow: hidden;
    }

    /* эффект при наведении */
    .app-shell:hover {
      box-shadow:
        0 25px 60px rgba(0,0,0,0.12),
        0 0 15px rgba(5,154,238,0.3);
    }

    /* плавное появление */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* контент внутри */
    .app-content {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      padding: clamp(24px, 3vw, 48px);
      overflow-x: hidden;
      overflow-y: scroll;
      scrollbar-width: none;   /* Firefox */
      box-sizing: border-box;
      padding-top: 0;
      color: #1A1A1A;
    }

    .app-content::-webkit-scrollbar { /* Chrome, Safari */
      display: none;
    }

    @media (max-width: 720px) {
      .app-shell {
        max-width: calc(100% - 2 * var(--page-pad));
      }
    }

    .app-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 0 8px;
      position: sticky;
      top: 0;
      background: #fefefe;
      z-index: 1;
    }

    .back-link {
      text-decoration: none;
      color: #00639C;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
    }

    .back-link:hover {
      color: #027FC2;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
  <main class="app-shell">
    <section class="app-content">
      <nav class="app-nav" aria-label="Навигация">
        <a class="back-link" href="javascript:history.back()">
          <span aria-hidden="true">‹</span>
          Назад
        </a>
      </nav>
      {% block content %}{% endblock %}
    </section>
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
