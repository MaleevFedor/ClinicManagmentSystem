{% extends "base.html" %}
{% block title %}Заявка на звонок{% endblock %}

{% block extra_head %}
<style>
  .call-confirmation {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    flex: 1;
    gap: 1.6rem;
    padding: 2rem;
    text-align: center;
  }

  .call-confirmation-card {
    background: #f6f9fc;
    border: 1px solid #e3ebf2;
    border-radius: 16px;
    padding: 2rem 2.4rem;
    max-width: 560px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .call-confirmation-card h1 {
    margin-top: 0;
    margin-bottom: 0.8rem;
  }

  .call-confirmation-card p {
    margin: 0;
    color: #4b4b4b;
    font-size: 1rem;
    line-height: 1.5;
  }

  .call-confirmation-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
  }

  .call-confirmation-actions a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.9rem 1.6rem;
    border-radius: 24px;
    text-decoration: none;
    font-weight: 600;
    color: #ffffff;
    background: #0182cb;
  }

  .call-confirmation-actions a.secondary {
    background: #6c6c6c;
  }
</style>
{% endblock %}

{% block content %}
  <section class="call-confirmation">
    <div class="call-confirmation-card">
      <h1>Ваш звонок зарегистрирован</h1>
      <p>Мы перезвоним вам в течение 15 минут.</p>
    </div>
    <div class="call-confirmation-actions">
      <a href="/book/online">Записаться онлайн</a>
      <a class="secondary" href="/">На главную</a>
    </div>
  </section>
{% endblock %}
